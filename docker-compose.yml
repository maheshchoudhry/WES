# WES OS — Company Engine local/dev orchestration.
# Brings up PostgreSQL, the FastAPI backend (with migrations + optional seed),
# and the React frontend served by nginx.
#
#   docker compose up --build
#
# Backend:  http://localhost:8000  (docs at /docs)
# Frontend: http://localhost:8080

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wes}
      POSTGRES_DB: ${POSTGRES_DB:-wes_os}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - wes_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wes} -d ${POSTGRES_DB:-wes_os}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      WES_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-wes}:${POSTGRES_PASSWORD:-wes}@db:5432/${POSTGRES_DB:-wes_os}
      WES_CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      WES_SEED_ON_START: ${WES_SEED_ON_START:-true}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  wes_pgdata:

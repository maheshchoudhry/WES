# WES OS reverse proxy. HTTPS-ready: run `certbot --nginx -d <domain>` to add a
# 443 server block + auto-redirect. Until WES is deployed, `/` serves a holding
# page and `/api` proxies to the (not-yet-running) backend on 127.0.0.1:8000.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Certbot HTTP-01 challenge.
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # Nginx-level health endpoint (used by verify.sh / monitoring).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # WES API (backend). 502 → friendly holding page while WES is not deployed.
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maintenance;
    }

    # Static frontend (served from /opt/wes/www until the real build is deployed).
    root /opt/wes/www;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }

    location = /maintenance { internal; try_files /index.html =503; }

    client_max_body_size 25m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
